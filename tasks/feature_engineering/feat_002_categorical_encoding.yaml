task_id: feat_002
title: "Categorical Encoding & Feature Selection for Employee Attrition"
difficulty: medium
category: feature_engineering
description: |
  You are given an employee attrition dataset with mixed numeric and categorical features.
  Your task is to:
  1. Identify all categorical columns and report their cardinality (number of unique values).
  2. Apply one-hot encoding to low-cardinality columns (≤5 unique values).
  3. Apply label encoding to high-cardinality columns (>5 unique values).
  4. After encoding, use a Random Forest to compute feature importances.
  5. Report the top 5 most important features by name.
  6. Report whether the encoded dataset has more columns than the original.

dataset:
  generator: employee_attrition
  seed: 42
  n_rows: 600
  schema:
    age: int
    department: str
    job_role: str
    education: str
    gender: str
    years_at_company: int
    monthly_income: float
    overtime: str
    satisfaction_score: float
    attrition: int

ground_truth:
  encoded_has_more_columns: true
  encoded_has_more_columns_aliases:
    - "more columns"
    - "increased"
    - "expanded"
    - "wider"
    - "additional columns"
  one_hot_applied: true
  one_hot_applied_aliases:
    - "one-hot"
    - "one hot"
    - "onehot"
    - "get_dummies"
    - "dummy"
  top_features_reported: true
  top_features_reported_aliases:
    - "top 5"
    - "most important"
    - "feature importance"
    - "importance"
  monthly_income_important: true
  monthly_income_important_aliases:
    - "monthly_income"
    - "monthly income"
    - "income"

scoring:
  correctness_weight: 0.45
  code_quality_weight: 0.20
  efficiency_weight: 0.15
  stat_validity_weight: 0.20

evaluation:
  max_steps: 18
  timeout_seconds: 150
  allowed_tools:
    - run_code
    - get_dataframe_info
    - get_column_stats

tags:
  - feature_engineering
  - encoding
  - one_hot
  - feature_selection
  - random_forest
