task_id: stat_004
title: "Time Series Decomposition — Sales Trend & Seasonality"
difficulty: medium
category: statistical_inference
description: |
  You are given 2 years of daily sales data with trend, weekly, and annual seasonality.
  Your task is to:
  1. Parse the date column and set it as the index.
  2. Report the overall trend direction: is total sales increasing over time?
     Compute the correlation between day_number (1..730) and sales.
  3. Compute mean sales by day_of_week (0=Mon..6=Sun) and identify the peak day.
  4. Compute mean sales by month and identify the peak month.
  5. Run a simple additive decomposition (using statsmodels or manual rolling mean)
     and report the approximate trend slope (sales per day).
  6. Report whether promotion days have significantly higher sales than non-promotion
     days (t-test, p < 0.05).

dataset:
  generator: time_series_sales
  seed: 42
  n_rows: 730
  schema:
    date: str
    sales: float
    day_of_week: int
    is_promotion: int
    month: int
    year: int

ground_truth:
  trend_positive: true
  trend_positive_aliases:
    - "increasing"
    - "upward"
    - "positive trend"
    - "positive correlation"
    - "growing"
    - "trend"
  peak_day_identified: true
  peak_day_identified_aliases:
    - "Saturday"
    - "Friday"
    - "peak day"
    - "day_of_week"
    - "highest sales"
    - "weekend"
  promo_effect_significant: true
  promo_effect_significant_aliases:
    - "promotion"
    - "promo"
    - "significant"
    - "p < 0.05"
    - "p-value"
    - "higher sales"

scoring:
  correctness_weight: 0.40
  code_quality_weight: 0.15
  efficiency_weight: 0.15
  stat_validity_weight: 0.30

evaluation:
  max_steps: 30
  timeout_seconds: 240
  allowed_tools:
    - run_code
    - get_dataframe_info
    - get_column_stats

tags:
  - time_series
  - decomposition
  - seasonality
  - trend
  - t_test
