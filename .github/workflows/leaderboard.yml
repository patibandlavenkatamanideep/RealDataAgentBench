name: Leaderboard

on:
  push:
    branches: [main]
    paths:
      - 'docs/results.json'
      - 'scripts/build_leaderboard.py'
      - 'realdataagentbench/scoring/**'
      - 'realdataagentbench/harness/pricing.py'
  workflow_dispatch:  # allow manual trigger from GitHub Actions UI

permissions:
  contents: write

jobs:
  build-leaderboard:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Build leaderboard data
        run: python scripts/build_leaderboard.py

      - name: Commit updated results.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/results.json
          git diff --staged --quiet || git commit -m "chore: update leaderboard [skip ci]"
          git push
